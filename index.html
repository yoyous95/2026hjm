<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생명 기술 학습 어드벤처</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (접속이 안정적인 cdnjs로 교체) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  
  <!-- Babel (브라우저용 JSX 컴파일러 - cdnjs로 교체) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin="anonymous"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      background-color: #111827; /* gray-900 */
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    /* Custom Animations */
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    
    @keyframes shake { 
      0%, 100% { transform: translateX(0); } 
      25% { transform: translateX(-5px); } 
      75% { transform: translateX(5px); } 
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- data-presets="react,env" 를 추가하여 모든 환경에서 안정적으로 동작하게 함 -->
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, Fragment } = React;

    // --- 학습 데이터 구조화 (교과서 기반) ---
    const LEARNING_STAGES = [
      {
        id: 1,
        title: "1. 생명 기술이란?",
        icon: <i className="fas fa-book-open text-blue-400" style={{fontSize: '32px'}}></i>,
        learnText: (
          <div className="space-y-4 text-gray-200 text-lg leading-relaxed">
            <p>인간은 오래전부터 가축과 작물의 품종을 개량해 우수한 품종을 얻고, 김치·치즈·빵 등과 같은 발효 식품을 만들어 먹었습니다.</p>
            <p className="bg-blue-900/30 p-4 rounded-lg border border-blue-500/30">
              이와 같이 <strong className="text-blue-300">동물</strong>이나 <strong className="text-green-300">식물</strong> 또는 <strong className="text-purple-300">미생물</strong>을 이용하여 인간 생활에 <strong className="text-yellow-300">유용한 물질</strong>을 만들거나 그 기능을 이용하는 수단이나 방법을 <strong>생명 기술</strong>이라 합니다.
            </p>
            <p>생명 기술은 질병, 식량 부족, 환경 오염 등의 문제를 해결할 수 있는 미래의 희망 기술입니다.</p>
          </div>
        ),
        gameType: "fill_blank",
      },
      {
        id: 2,
        title: "2. 생명 기술의 특성",
        icon: <i className="fas fa-wave-square text-pink-400" style={{fontSize: '32px'}}></i>,
        learnText: (
          <div className="space-y-3 text-gray-200">
            <p className="mb-4 text-lg">생명 기술은 다음과 같은 특별한 5가지 성질을 가지고 있어요.</p>
            <ul className="grid grid-cols-1 gap-3">
              <li className="bg-gray-800 p-3 rounded-lg flex items-center"><span className="text-2xl mr-3">💰</span> <strong>부가 가치가 높다:</strong> 결과의 가치가 크다. (예: 의약품 생산)</li>
              <li className="bg-gray-800 p-3 rounded-lg flex items-center"><span className="text-2xl mr-3">🤝</span> <strong>다른 기술과 융합한다:</strong> 정보통신 등 다른 기술과 합쳐진다. (예: 스마트폰 건강 진단)</li>
              <li className="bg-gray-800 p-3 rounded-lg flex items-center"><span className="text-2xl mr-3">🌿</span> <strong>환경친화적인 기술이다:</strong> 환경을 회복하고 보존한다. (예: 기름 분해 미생물)</li>
              <li className="bg-gray-800 p-3 rounded-lg flex items-center"><span className="text-2xl mr-3">🏡</span> <strong>인간 생활과 밀접하다:</strong> 식품, 의료 등 생활과 관련이 깊다. (예: 과일과 채소)</li>
              <li className="bg-gray-800 p-3 rounded-lg flex items-center"><span className="text-2xl mr-3">🌍</span> <strong>대상 범위가 넓다:</strong> 살아있는 모든 생명체가 대상이다. (동식물, 미생물, 바이러스 등)</li>
            </ul>
          </div>
        ),
        gameType: "matching",
      },
      {
        id: 3,
        title: "3. 생명 기술 시스템의 의미",
        icon: <i className="fas fa-cog text-yellow-400" style={{fontSize: '32px'}}></i>,
        learnText: (
          <div className="space-y-4 text-gray-200 text-lg leading-relaxed">
            <p>우리가 원하는 생명 기술 제품을 얻으려면 체계적인 과정이 필요합니다. 이를 <strong>생명 기술 시스템</strong>이라고 합니다.</p>
            
            <div className="bg-gray-800 p-5 rounded-lg border border-gray-600 flex flex-col gap-6">
              
              {/* === 시각적 다이어그램 (되먹임 화살표 개선) === */}
              <div className="relative w-full max-w-lg mx-auto pt-4 pb-6">
                {/* 상단 3단계 (투입 -> 과정 -> 산출) */}
                <div className="grid grid-cols-3 relative z-10">
                  <div className="flex flex-col items-center relative">
                    <div className="w-20 md:w-24 py-3 bg-blue-900/80 border-2 border-blue-400 rounded-lg text-center font-bold text-sm md:text-base shadow-lg z-10 text-blue-100">투입</div>
                    <i className="fas fa-arrow-right absolute top-1/2 text-gray-500 z-20" style={{fontSize: '20px', right: '-1.25rem', transform: 'translateY(-50%)'}}></i>
                  </div>
                  <div className="flex flex-col items-center relative">
                    <div className="w-20 md:w-24 py-3 bg-yellow-900/80 border-2 border-yellow-400 rounded-lg text-center font-bold text-sm md:text-base shadow-lg z-10 text-yellow-100">과정</div>
                    <i className="fas fa-arrow-right absolute top-1/2 text-gray-500 z-20" style={{fontSize: '20px', right: '-1.25rem', transform: 'translateY(-50%)'}}></i>
                  </div>
                  <div className="flex flex-col items-center relative">
                    <div className="w-20 md:w-24 py-3 bg-green-900/80 border-2 border-green-400 rounded-lg text-center font-bold text-sm md:text-base shadow-lg z-10 text-green-100">산출</div>
                  </div>
                </div>
                
                {/* 하단 1단계 (되먹임) */}
                <div className="flex justify-center mt-12 relative z-10">
                  <div className="w-28 md:w-32 py-3 bg-purple-900/90 border-2 border-purple-400 rounded-lg text-center font-bold text-purple-100 shadow-[0_0_15px_rgba(168,85,247,0.4)] flex items-center justify-center gap-1 z-10">
                    <i className="fas fa-sync-alt mr-1"></i> 되먹임
                  </div>
                </div>

                {/* 피드백 연결 화살표 (CSS Line - 동적 렌더링 오류 방지를 위한 Inline Style 적용) */}
                <div className="absolute inset-0 pointer-events-none z-0">
                  {/* 바닥을 잇는 ㄷ자 형태의 선 */}
                  <div className="absolute border-b-2 border-l-2 border-r-2 border-purple-400 border-dashed rounded-b-xl opacity-80" 
                       style={{top: '35%', bottom: '25%', left: '16.66%', right: '16.66%'}}>
                     {/* 투입으로 향하는 화살표 */}
                     <div className="absolute text-purple-400 bg-gray-800 rounded-full" style={{top: '-10px', left: '-11px'}}>
                       <i className="fas fa-arrow-up" style={{fontSize: '20px'}}></i>
                     </div>
                     {/* 산출로 향하는 화살표 */}
                     <div className="absolute text-purple-400 bg-gray-800 rounded-full" style={{top: '-10px', right: '-11px'}}>
                       <i className="fas fa-arrow-up" style={{fontSize: '20px'}}></i>
                     </div>
                  </div>
                  {/* 과정으로 향하는 중앙 세로 선 */}
                  <div className="absolute border-l-2 border-purple-400 border-dashed opacity-80"
                       style={{top: '35%', bottom: '25%', left: '50%'}}>
                     <div className="absolute text-purple-400 bg-gray-800 rounded-full" style={{top: '-10px', left: '-11px'}}>
                       <i className="fas fa-arrow-up" style={{fontSize: '20px'}}></i>
                     </div>
                  </div>
                </div>
              </div>
              {/* ======================================= */}

              <div className="flex flex-col gap-3">
                <div className="bg-blue-900/30 p-4 rounded-lg border-l-4 border-blue-500">
                  <h4 className="font-bold text-blue-400 mb-1 flex items-center"><span className="text-xl mr-2">📥</span> 투입 (Input)</h4>
                  <p className="text-base text-gray-300">동식물 자원, 첨단 기술, 시설, 자본 및 인력 등을 투입한다.</p>
                </div>
                <div className="bg-yellow-900/30 p-4 rounded-lg border-l-4 border-yellow-500">
                  <h4 className="font-bold text-yellow-400 mb-1 flex items-center"><span className="text-xl mr-2">⚙️</span> 과정 (Process)</h4>
                  <p className="text-base text-gray-300">첨단 기술과 시설 등을 이용하여 새로운 생명 자원을 개발하거나 환경을 개선한다.</p>
                </div>
                <div className="bg-green-900/30 p-4 rounded-lg border-l-4 border-green-500">
                  <h4 className="font-bold text-green-400 mb-1 flex items-center"><span className="text-xl mr-2">🎁</span> 산출 (Output)</h4>
                  <p className="text-base text-gray-300">생명 기술 시스템의 단계를 거쳐 동식물, 에너지, 의약품, 환경 정화 물질 등을 개발 또는 완성한다.</p>
                </div>
                <div className="bg-purple-900/30 p-4 rounded-lg border-l-4 border-purple-500 relative overflow-hidden">
                  <h4 className="font-bold text-purple-400 mb-1 flex items-center"><span className="text-xl mr-2">🔄</span> 되먹임 (Feedback)</h4>
                  <p className="text-base text-gray-300">산출된 결과물을 평가하여 개선할 점을 확인한 후, 수정하여 새로운 개발에 도움을 준다.</p>
                  <p className="mt-2 text-sm text-purple-300 font-bold">※ 위 그림처럼 평가 결과는 투입, 과정, 산출 모든 단계로 되돌아가 피드백 됩니다.</p>
                </div>
              </div>
            </div>
          </div>
        ),
        gameType: "ordering",
      },
      {
        id: 4,
        title: "4. 생명 기술 시스템의 '과정'",
        icon: <i className="fas fa-layer-group text-orange-400" style={{fontSize: '32px'}}></i>,
        learnText: (
          <div className="space-y-4 text-gray-200 text-lg leading-relaxed">
            <p>생명 기술 시스템의 <strong>'과정'</strong> 단계는 동식물 자원이 결과물로 완성되기까지 거치는 구체적인 활동들입니다.</p>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
              <div className="bg-orange-900/30 p-4 rounded-xl border border-orange-500/30">
                <h4 className="font-bold text-orange-400 text-xl mb-2 flex items-center">🌱 번식과 성장</h4>
                <p className="text-gray-300 text-base">생명체를 개발하고 크기를 키운다.</p>
              </div>
              <div className="bg-orange-900/30 p-4 rounded-xl border border-orange-500/30">
                <h4 className="font-bold text-orange-400 text-xl mb-2 flex items-center">🩺 유지와 치료</h4>
                <p className="text-gray-300 text-base">성장을 위한 조건을 유지하고 질병을 치료한다.</p>
              </div>
              <div className="bg-orange-900/30 p-4 rounded-xl border border-orange-500/30">
                <h4 className="font-bold text-orange-400 text-xl mb-2 flex items-center">🌾 수확과 가공</h4>
                <p className="text-gray-300 text-base">생명체를 수확하고 형태나 속성을 변화시킨다.</p>
              </div>
              <div className="bg-orange-900/30 p-4 rounded-xl border border-orange-500/30">
                <h4 className="font-bold text-orange-400 text-xl mb-2 flex items-center">🦎 적응</h4>
                <p className="text-gray-300 text-base">환경 변화에 적응시킨다.</p>
              </div>
            </div>
          </div>
        ),
        gameType: "process_matching",
      },
      {
        id: 5,
        title: "5. 시스템의 전체 요소 분류",
        icon: <i className="fas fa-sync-alt text-emerald-400" style={{fontSize: '32px'}}></i>,
        learnText: (
          <div className="space-y-4 text-gray-200">
            <p className="text-lg">마지막으로 시스템의 각 단계에 포함되는 구체적인 요소들을 정리해 봅시다.</p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div className="border border-blue-500/30 p-3 rounded-lg bg-blue-900/10">
                <h4 className="font-bold text-blue-400 border-b border-gray-700 pb-2 mb-2">📥 투입</h4>
                <p className="text-sm text-gray-300">동식물 자원, 첨단 기술, 자본 및 인력, 시설</p>
              </div>
              <div className="border border-yellow-500/30 p-3 rounded-lg bg-yellow-900/10">
                <h4 className="font-bold text-yellow-400 border-b border-gray-700 pb-2 mb-2">⚙️ 과정</h4>
                <p className="text-sm text-gray-300">번식과 성장, 유지와 치료, 수확과 가공, 적응</p>
              </div>
              <div className="border border-green-500/30 p-3 rounded-lg bg-green-900/10">
                <h4 className="font-bold text-green-400 border-b border-gray-700 pb-2 mb-2">🎁 산출</h4>
                <p className="text-sm text-gray-300">새로운 작물, 의약품, 동물 복제, 환경 정화 물질</p>
              </div>
              <div className="border border-purple-500/30 p-3 rounded-lg bg-purple-900/10">
                <h4 className="font-bold text-purple-400 border-b border-gray-700 pb-2 mb-2">🔄 되먹임</h4>
                <p className="text-sm text-gray-300">평가하여 개선할 점 확인, 수정하여 새로운 개발에 도움</p>
              </div>
            </div>
          </div>
        ),
        gameType: "classification",
      }
    ];

    // --- 공통 컴포넌트 추출 (렌더링 최적화) ---
    function StepBox({ idx, currentBox, name }) {
      return (
        <div className={`w-20 h-20 md:w-28 md:h-28 rounded-xl flex items-center justify-center font-bold text-lg md:text-xl border-2 transition-all z-10 shrink-0
          ${idx < currentBox ? 'bg-emerald-900/70 border-emerald-500 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.4)]' 
          : idx === currentBox ? 'bg-gray-800 border-dashed border-gray-500 text-gray-500' 
          : 'bg-gray-900 border-gray-700 text-gray-700'}`}
        >
          {idx < currentBox ? name : '?'}
        </div>
      );
    }

    function BiotechLearningGame() {
      const [currentStage, setCurrentStage] = useState(-1);
      const [phase, setPhase] = useState('learn');
      
      const startGame = () => {
        setCurrentStage(0);
        setPhase('learn');
      };

      const nextStage = () => {
        if (currentStage >= LEARNING_STAGES.length - 1) {
          setCurrentStage(LEARNING_STAGES.length);
        } else {
          setCurrentStage(currentStage + 1);
          setPhase('learn');
        }
      };

      return (
        <div className="flex flex-col items-center min-h-full font-sans select-none w-full max-w-4xl mx-auto">
          
          {/* Top Progress Bar */}
          {currentStage >= 0 && currentStage < LEARNING_STAGES.length && (
            <div className="w-full max-w-3xl mb-6">
              <div className="flex justify-between text-xs text-gray-400 mb-2 font-bold px-1">
                <span>개념 읽기</span>
                <span>직접 해보기</span>
              </div>
              <div className="w-full bg-gray-800 rounded-full h-3 flex overflow-hidden">
                <div className={`h-3 bg-blue-500 transition-all duration-500 ${phase === 'learn' ? 'w-1/2' : 'w-full'}`}></div>
              </div>
              <div className="mt-4 flex gap-2">
                {LEARNING_STAGES.map((s, idx) => (
                  <div key={s.id} className={`h-2 flex-1 rounded-full transition-all duration-300 ${idx < currentStage ? 'bg-emerald-500' : idx === currentStage ? 'bg-blue-400 animate-pulse shadow-[0_0_10px_rgba(96,165,250,0.5)]' : 'bg-gray-700'}`} />
                ))}
              </div>
            </div>
          )}

          <div className="w-full max-w-3xl bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden flex flex-col relative min-h-[550px]">
            
            {/* === INTRO SCREEN === */}
            {currentStage === -1 && (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-gray-800 to-gray-900">
                <div className="w-24 h-24 bg-blue-500/20 rounded-full flex items-center justify-center mb-6">
                  <i className="fas fa-bullseye text-blue-400" style={{fontSize: '48px'}}></i>
                </div>
                <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
                  생명 기술 개념 탐험
                </h1>
                <p className="text-xl text-gray-300 mb-8 max-w-md">
                  교과서 핵심 개념을 직접 조립하며 생명 기술 마스터가 되어보세요!
                </p>
                <button 
                  onClick={startGame}
                  className="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold text-xl transition-transform hover:scale-105 shadow-lg shadow-blue-500/30 flex items-center"
                >
                  개념 학습 시작하기 <i className="fas fa-arrow-right ml-2"></i>
                </button>
              </div>
            )}

            {/* === LEARNING PHASE === */}
            {currentStage >= 0 && currentStage < LEARNING_STAGES.length && phase === 'learn' && (
              <div className="flex flex-col h-full animate-fadeIn">
                <div className="bg-gray-800 p-6 border-b border-gray-700 flex items-center gap-4">
                  {LEARNING_STAGES[currentStage].icon}
                  <h2 className="text-2xl font-bold">{LEARNING_STAGES[currentStage].title}</h2>
                </div>
                <div className="p-6 md:p-8 flex-1 overflow-y-auto">
                  <div className="bg-gray-900 rounded-xl p-6 border border-gray-700 shadow-inner">
                    <div className="flex items-center gap-2 mb-4 text-emerald-400 font-bold">
                      <i className="fas fa-lightbulb" style={{fontSize: '20px'}}></i> <span className="ml-2">핵심 개념 읽기</span>
                    </div>
                    {LEARNING_STAGES[currentStage].learnText}
                  </div>
                </div>
                <div className="p-6 bg-gray-800 border-t border-gray-700 flex justify-end">
                  <button 
                    onClick={() => setPhase('play')}
                    className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-transform hover:-translate-y-1 shadow-lg shadow-emerald-500/20 flex items-center"
                  >
                    직접 해보기 <i className="fas fa-arrow-right ml-2"></i>
                  </button>
                </div>
              </div>
            )}

            {/* === PLAYING PHASE (Mini Games) === */}
            {currentStage >= 0 && currentStage < LEARNING_STAGES.length && phase === 'play' && (
              <div className="flex flex-col h-full bg-gray-900 animate-fadeIn">
                <div className="bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between">
                  <h2 className="text-xl font-bold text-emerald-400">학습 미션: 배운 내용 조립하기</h2>
                </div>
                <div className="p-6 md:p-8 flex-1 flex flex-col justify-center">
                  {LEARNING_STAGES[currentStage].gameType === "fill_blank" && <GameFillBlank onComplete={nextStage} />}
                  {LEARNING_STAGES[currentStage].gameType === "matching" && <GameMatching onComplete={nextStage} />}
                  {LEARNING_STAGES[currentStage].gameType === "ordering" && <GameOrdering onComplete={nextStage} />}
                  {LEARNING_STAGES[currentStage].gameType === "process_matching" && <GameProcessMatching onComplete={nextStage} />}
                  {LEARNING_STAGES[currentStage].gameType === "classification" && <GameClassification onComplete={nextStage} />}
                </div>
              </div>
            )}

            {/* === COMPLETION SCREEN === */}
            {currentStage === LEARNING_STAGES.length && (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-emerald-900 to-gray-900 animate-fadeIn">
                <div className="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6 border-4 border-emerald-400">
                  <i className="fas fa-check-circle text-emerald-400" style={{fontSize: '48px'}}></i>
                </div>
                <h1 className="text-4xl font-extrabold text-white mb-4">
                  생명 기술 마스터 완료!
                </h1>
                <p className="text-xl text-emerald-200 mb-8">
                  생명 기술의 의미부터 시스템의 세부 단계까지 완벽하게 이해했습니다.
                </p>
                <button 
                  onClick={() => { setCurrentStage(-1); setPhase('learn'); }}
                  className="px-8 py-4 bg-gray-700 hover:bg-gray-600 text-white rounded-full font-bold text-lg transition-transform hover:scale-105 flex items-center"
                >
                  <i className="fas fa-sync-alt mr-2"></i> 처음부터 다시 보기
                </button>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ==========================================
    // Mini Game 1: 빈칸 채우기
    // ==========================================
    function GameFillBlank({ onComplete }) {
      const [blanks, setBlanks] = useState([null, null, null]);
      const [errorWord, setErrorWord] = useState(null);
      const correctAnswers = ["동물", "미생물", "유용한 물질"];
      const wordBank = ["무생물", "동물", "화학 물질", "미생물", "유용한 물질", "기계 부품"];

      const handleWordClick = (word) => {
        const emptyIndex = blanks.findIndex(b => b === null);
        if (emptyIndex === -1) return;
        
        if (correctAnswers[emptyIndex] === word) {
          const newBlanks = [...blanks];
          newBlanks[emptyIndex] = word;
          setBlanks(newBlanks);
        } else {
          setErrorWord(word);
          setTimeout(() => setErrorWord(null), 800);
        }
      };

      const resetBlanks = () => setBlanks([null, null, null]);
      const isComplete = blanks.every(b => b !== null);

      return (
        <div className="flex flex-col items-center">
          <p className="text-gray-300 mb-6 text-center text-lg">알맞은 단어를 순서대로 클릭하여 생명 기술의 정의를 완성하세요.</p>
          
          <div className="bg-gray-800 p-6 rounded-xl text-xl leading-relaxed mb-8 border border-gray-700 shadow-lg max-w-2xl text-center">
            <BlankSlot val={blanks[0]} num={1} />이나 식물 또는 <BlankSlot val={blanks[1]} num={2} />을(를) 이용하여 인간 생활에 <BlankSlot val={blanks[2]} num={3} />을(를) 만들거나 그 기능을 이용하는 수단이나 방법
          </div>

          <div className="flex flex-wrap justify-center gap-3 mb-8 max-w-2xl">
            {wordBank.map((word, i) => {
              const isUsed = blanks.includes(word);
              const isError = errorWord === word;
              return (
                <button
                  key={i}
                  onClick={() => handleWordClick(word)}
                  disabled={isUsed || isComplete}
                  className={`px-4 py-3 rounded-lg font-bold text-lg transition-all
                    ${isUsed ? 'bg-gray-700 text-gray-500 cursor-not-allowed opacity-50' 
                    : isError ? 'bg-red-500/80 text-white animate-shake' 
                    : 'bg-blue-600 hover:bg-blue-500 text-white active:scale-95 shadow-md'}`}
                >
                  {word}
                </button>
              );
            })}
          </div>

          <div className="h-12 flex items-center">
            {isComplete ? (
              <button onClick={onComplete} className="px-6 py-2 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-full animate-bounce shadow-lg shadow-emerald-500/30 flex items-center">
                정답입니다! 다음으로 <i className="fas fa-arrow-right ml-2" style={{fontSize: '18px'}}></i>
              </button>
            ) : (
              <button onClick={resetBlanks} className="text-gray-400 hover:text-white flex items-center text-sm">
                <i className="fas fa-sync-alt mr-1" style={{fontSize: '16px'}}></i> 다시 채우기
              </button>
            )}
          </div>
        </div>
      );
    }

    function BlankSlot({ val, num }) {
      if (val) return <span className="inline-block px-3 py-1 mx-1 bg-blue-500/20 text-blue-300 border-b-2 border-blue-400 font-bold min-w-[60px] text-center animate-fadeIn">{val}</span>;
      return <span className="inline-block px-3 py-1 mx-1 bg-gray-700 text-gray-500 border-b-2 border-gray-500 min-w-[80px] text-center text-sm">[{num}번]</span>;
    }

    // ==========================================
    // Mini Game 2: 짝맞추기
    // ==========================================
    function GameMatching({ onComplete }) {
      const [step, setStep] = useState(0);
      const [errorMsg, setErrorMsg] = useState(false);

      const questions = [
        { ex: "질병 치료를 위한 '의약품 생산'", ans: "부가 가치가 높다" },
        { ex: "오염된 바다를 살리는 '기름 분해 미생물'", ans: "환경친화적이다" },
        { ex: "스마트폰을 이용한 '건강 진단 앱'", ans: "다른 기술과 융합한다" }
      ];

      const options = ["부가 가치가 높다", "환경친화적이다", "다른 기술과 융합한다", "대상 범위가 넓다"];

      const handleSelect = (opt) => {
        if (opt === questions[step].ans) {
          setErrorMsg(false);
          setStep(prev => prev + 1);
        } else {
          setErrorMsg(true);
          setTimeout(() => setErrorMsg(false), 800);
        }
      };

      if (step >= questions.length) {
        return (
          <div className="flex flex-col items-center justify-center text-center animate-fadeIn">
            <i className="fas fa-check-circle text-emerald-400 mb-4" style={{fontSize: '64px'}}></i>
            <h3 className="text-2xl font-bold text-white mb-6">특성 연결하기 완료!</h3>
            <button onClick={onComplete} className="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-full shadow-lg shadow-emerald-500/30 flex items-center">
              다음 단계로 <i className="fas fa-arrow-right ml-2"></i>
            </button>
          </div>
        );
      }

      const currentQ = questions[step];

      return (
        <div className="flex flex-col items-center max-w-2xl mx-auto w-full">
          <div className="text-sm font-bold text-gray-400 mb-2">문제 {step + 1} / {questions.length}</div>
          <p className="text-gray-300 mb-6 text-center text-lg">다음 예시가 설명하는 생명 기술의 특성은 무엇일까요?</p>
          
          <div className="bg-gradient-to-r from-blue-900 to-indigo-900 p-8 rounded-2xl w-full text-center border border-blue-500/30 shadow-xl mb-8">
            <div className="text-3xl mb-4">🤔</div>
            <h3 className="text-2xl font-extrabold text-white">{currentQ.ex}</h3>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
            {options.map((opt, i) => (
              <button
                key={i}
                onClick={() => handleSelect(opt)}
                className={`p-4 rounded-xl font-bold text-lg text-left transition-all border-2
                  ${errorMsg ? 'border-gray-700 bg-gray-800 text-gray-300' : 'border-gray-700 bg-gray-800 hover:border-blue-400 hover:bg-gray-700 text-gray-200'} active:scale-95`}
              >
                {opt}
              </button>
            ))}
          </div>
          {errorMsg && <p className="text-red-400 font-bold mt-4 animate-shake">다시 한번 생각해 보세요!</p>}
        </div>
      );
    }

    // ==========================================
    // Mini Game 3: 순서 나열하기
    // ==========================================
    function GameOrdering({ onComplete }) {
      const correctOrder = ["투입", "과정", "산출", "되먹임"];
      const [currentBox, setCurrentBox] = useState(0);
      const [errorId, setErrorId] = useState(null);

      const handleClick = (item) => {
        if (item === correctOrder[currentBox]) {
          setCurrentBox(prev => prev + 1);
          setErrorId(null);
        } else {
          setErrorId(item);
          setTimeout(() => setErrorId(null), 800);
        }
      };

      const isComplete = currentBox >= correctOrder.length;

      return (
        <div className="flex flex-col items-center w-full max-w-xl mx-auto">
          <p className="text-gray-300 mb-8 text-center text-lg">아래 버튼을 눌러 생명 기술 시스템이 진행되는 순서를 완성하세요.</p>
          
          <div className="relative w-full pb-8 mb-8">
            <div className="grid grid-cols-3 relative z-10 w-full">
              <div className="flex flex-col items-center relative">
                 <StepBox idx={0} currentBox={currentBox} name="투입" />
                 <i className="fas fa-arrow-right absolute top-1/2 text-gray-500 z-20" style={{fontSize: '24px', right: '-1.5rem', transform: 'translateY(-50%)'}}></i>
              </div>
              <div className="flex flex-col items-center relative">
                 <StepBox idx={1} currentBox={currentBox} name="과정" />
                 <i className="fas fa-arrow-right absolute top-1/2 text-gray-500 z-20" style={{fontSize: '24px', right: '-1.5rem', transform: 'translateY(-50%)'}}></i>
              </div>
              <div className="flex flex-col items-center relative">
                 <StepBox idx={2} currentBox={currentBox} name="산출" />
              </div>
            </div>

            <div className="flex justify-center mt-12 md:mt-16 relative z-10">
               <StepBox idx={3} currentBox={currentBox} name="되먹임" />
            </div>

            {currentBox > 3 && (
              <div className="absolute inset-0 pointer-events-none z-0 animate-fadeIn">
                <div className="absolute border-b-4 border-l-4 border-r-4 border-emerald-500 border-dashed rounded-b-2xl opacity-60"
                     style={{top: '40%', bottom: '25%', left: '16.66%', right: '16.66%'}}>
                   <div className="absolute text-emerald-500 bg-gray-900 rounded-full" style={{top: '-14px', left: '-14px'}}>
                     <i className="fas fa-arrow-up" style={{fontSize: '24px'}}></i>
                   </div>
                   <div className="absolute text-emerald-500 bg-gray-900 rounded-full" style={{top: '-14px', right: '-14px'}}>
                     <i className="fas fa-arrow-up" style={{fontSize: '24px'}}></i>
                   </div>
                </div>
                <div className="absolute border-l-4 border-emerald-500 border-dashed opacity-60"
                     style={{top: '40%', bottom: '25%', left: '50%', transform: 'translateX(-50%)'}}>
                   <div className="absolute text-emerald-500 bg-gray-900 rounded-full" style={{top: '-14px', left: '-14px'}}>
                     <i className="fas fa-arrow-up" style={{fontSize: '24px'}}></i>
                   </div>
                </div>
              </div>
            )}
          </div>

          <div className="flex flex-wrap justify-center gap-3 w-full mb-8 relative z-20">
            {!isComplete && ["되먹임", "산출", "과정", "투입"].map((opt) => {
              const isUsed = correctOrder.indexOf(opt) < currentBox;
              const isError = errorId === opt;
              return (
                <button
                  key={opt}
                  onClick={() => handleClick(opt)}
                  disabled={isUsed}
                  className={`px-6 py-3 rounded-lg font-bold text-lg w-[120px] transition-all
                    ${isUsed ? 'opacity-0 scale-90' 
                    : isError ? 'bg-red-500 text-white animate-shake' 
                    : 'bg-gray-700 hover:bg-gray-600 text-white border-b-4 border-gray-900 active:border-b-0 active:translate-y-1'}`}
                >
                  {opt}
                </button>
              );
            })}
          </div>

          {isComplete && (
            <button onClick={onComplete} className="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-full animate-bounce shadow-lg shadow-emerald-500/30 flex items-center relative z-20">
              완벽합니다! 다음 단계로 <i className="fas fa-arrow-right ml-2"></i>
            </button>
          )}
        </div>
      );
    }

    // ==========================================
    // Mini Game 4: 과정 단계 짝맞추기
    // ==========================================
    function GameProcessMatching({ onComplete }) {
      const [step, setStep] = useState(0);
      const [errorMsg, setErrorMsg] = useState(false);

      const questions = [
        { ex: "생명체를 개발하고 크기를 키운다.", ans: "번식과 성장" },
        { ex: "성장을 위한 조건을 유지하고 질병을 치료한다.", ans: "유지와 치료" },
        { ex: "생명체를 수확하고 형태나 속성을 변화시킨다.", ans: "수확과 가공" },
        { ex: "환경 변화에 생명체를 맞춘다.", ans: "적응" }
      ];

      const options = ["수확과 가공", "번식과 성장", "적응", "유지와 치료"];

      const handleSelect = (opt) => {
        if (opt === questions[step].ans) {
          setErrorMsg(false);
          setStep(prev => prev + 1);
        } else {
          setErrorMsg(true);
          setTimeout(() => setErrorMsg(false), 800);
        }
      };

      if (step >= questions.length) {
        return (
          <div className="flex flex-col items-center justify-center text-center animate-fadeIn">
            <i className="fas fa-check-circle text-orange-400 mb-4" style={{fontSize: '64px'}}></i>
            <h3 className="text-2xl font-bold text-white mb-6">'과정' 세부 요소 연결 완료!</h3>
            <button onClick={onComplete} className="px-6 py-3 bg-orange-500 hover:bg-orange-400 text-white font-bold rounded-full shadow-lg shadow-orange-500/30 flex items-center">
              다음 단계로 <i className="fas fa-arrow-right ml-2"></i>
            </button>
          </div>
        );
      }

      const currentQ = questions[step];

      return (
        <div className="flex flex-col items-center max-w-2xl mx-auto w-full">
          <div className="text-sm font-bold text-gray-400 mb-2">문제 {step + 1} / {questions.length}</div>
          <p className="text-gray-300 mb-6 text-center text-lg">다음 설명에 해당하는 '과정' 단계의 세부 요소는 무엇일까요?</p>
          
          <div className="bg-gradient-to-r from-orange-900 to-red-900 p-8 rounded-2xl w-full text-center border border-orange-500/30 shadow-xl mb-8 h-40 flex items-center justify-center">
            <h3 className="text-2xl font-extrabold text-white leading-relaxed">{currentQ.ex}</h3>
          </div>

          <div className="grid grid-cols-2 gap-3 w-full">
            {options.map((opt, i) => (
              <button
                key={i}
                onClick={() => handleSelect(opt)}
                className={`p-4 rounded-xl font-bold text-lg text-center transition-all border-2
                  ${errorMsg ? 'border-gray-700 bg-gray-800 text-gray-300' : 'border-gray-700 bg-gray-800 hover:border-orange-400 hover:bg-gray-700 text-gray-200'} active:scale-95`}
              >
                {opt}
              </button>
            ))}
          </div>
          {errorMsg && <p className="text-red-400 font-bold mt-4 animate-shake">다시 한번 생각해 보세요!</p>}
        </div>
      );
    }

    // ==========================================
    // Mini Game 5: 요소 분류하기
    // ==========================================
    function GameClassification({ onComplete }) {
      const [items] = useState([
        { id: 1, name: "동식물 자원", category: "투입" },
        { id: 2, name: "새로운 작물", category: "산출" },
        { id: 3, name: "번식과 성장", category: "과정" },
        { id: 4, name: "평가하여 개선", category: "되먹임" },
        { id: 5, name: "자본과 시설", category: "투입" },
        { id: 6, name: "의약품", category: "산출" },
        { id: 7, name: "수확과 가공", category: "과정" },
        { id: 8, name: "수정하여 반영", category: "되먹임" },
      ]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [buckets, setBuckets] = useState({ "투입": [], "과정": [], "산출": [], "되먹임": [] });
      const [errorBucket, setErrorBucket] = useState(null);

      const currentItem = items[currentIndex];

      const handleBucketClick = (category) => {
        if (!currentItem) return;

        if (currentItem.category === category) {
          setBuckets(prev => ({
            ...prev,
            [category]: [...prev[category], currentItem.name]
          }));
          setCurrentIndex(prev => prev + 1);
          setErrorBucket(null);
        } else {
          setErrorBucket(category);
          setTimeout(() => setErrorBucket(null), 800);
        }
      };

      const isComplete = currentIndex >= items.length;

      return (
        <div className="flex flex-col items-center w-full max-w-3xl mx-auto h-full justify-between">
          <div className="text-center w-full mb-6">
            <p className="text-gray-300 text-lg mb-4">제시된 요소가 시스템의 어느 단계에 속하는지 선택하세요.</p>
            
            {!isComplete ? (
              <div className="bg-blue-600 inline-block px-8 py-4 rounded-2xl font-bold text-2xl shadow-lg border-2 border-blue-400 animate-fadeIn">
                "{currentItem.name}"
              </div>
            ) : (
              <div className="bg-emerald-600 inline-block px-8 py-4 rounded-2xl font-bold text-2xl shadow-lg animate-fadeIn text-white flex items-center justify-center mx-auto">
                <i className="fas fa-check-circle mr-2"></i> 모든 분류 완료!
              </div>
            )}
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full mb-8">
            {["투입", "과정", "산출", "되먹임"].map(cat => {
              const isError = errorBucket === cat;
              return (
                <div 
                  key={cat}
                  onClick={() => !isComplete && handleBucketClick(cat)}
                  className={`flex flex-col border-2 rounded-xl overflow-hidden transition-all h-40 cursor-pointer
                    ${isComplete ? 'border-emerald-500/50 bg-gray-800' : isError ? 'border-red-500 bg-red-900/20 animate-shake' : 'border-gray-600 bg-gray-800 hover:border-gray-400'}`}
                >
                  <div className="bg-gray-700 p-2 text-center font-bold text-gray-200 border-b border-gray-600">
                    {cat}
                  </div>
                  <div className="p-2 flex flex-col gap-1 overflow-y-auto flex-1">
                    {buckets[cat].map((itemName, idx) => (
                      <div key={idx} className="bg-gray-900 text-emerald-400 text-xs p-1.5 rounded text-center animate-fadeIn border border-gray-700">
                        {itemName}
                      </div>
                    ))}
                  </div>
                </div>
              )
            })}
          </div>

          {isComplete && (
             <button onClick={onComplete} className="px-8 py-4 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-full animate-bounce shadow-lg shadow-emerald-500/30 text-xl">
               학습 완료하기!
             </button>
          )}
        </div>
      );
    }

    // 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BiotechLearningGame />);
  </script>
</body>
</html>
